# Omarchy Glass - Visual enhancements for Omarchy
# https://wiki.hyprland.org/Configuring/Variables/
#
# This file is theme-agnostic: border gradient uses Omarchy's default
# accent colors which look good on any dark theme.

general {
    gaps_in = 6
    gaps_out = 12
    border_size = 2

    # Gradient border — auto-matched to theme by install.sh and theme-set hook
    # Default: Omarchy stock gradient; replaced with theme color4→color5 on install
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
}

decoration {
    rounding = 12

    shadow {
        enabled = true
        range = 20
        render_power = 2
        color = rgba(1a1a1a60)
        offset = 0, 4
    }

    blur {
        enabled = true
        size = 7
        passes = 3
        special = true
        brightness = 0.65
        contrast = 0.80
        noise = 0.02
        vibrancy = 0.20
        popups = true
    }

    inactive_opacity = 0.93
}

animations {
    bezier = fluent, 0.1, 0.9, 0.2, 1.0

    animation = global, 1, 5, default
    animation = windowsIn, 1, 2.5, easeOutQuint, slide
    animation = windowsOut, 1, 1, linear, slide
    animation = fade, 1, 1.8, quick
    animation = workspaces, 1, 2.5, fluent, slide
    animation = layers, 1, 2, easeOutQuint
    animation = borderangle, 1, 120, linear, loop
}

group {
    groupbar {
        gradient_rounding = 8
    }
}

# Frosted glass for overlay layers
layerrule = blur on, match:namespace waybar
layerrule = ignore_alpha 0.3, match:namespace waybar
layerrule = blur on, match:namespace walker
layerrule = ignore_alpha 0.3, match:namespace walker
layerrule = blur on, match:namespace mako
layerrule = ignore_alpha 0.3, match:namespace mako
layerrule = blur on, match:namespace swayosd
layerrule = ignore_alpha 0.3, match:namespace swayosd
